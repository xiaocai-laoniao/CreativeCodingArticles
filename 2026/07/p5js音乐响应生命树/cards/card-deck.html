<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐响应生命树实现过程卡片</title>
<style>
  :root {
    --pg: #f5f4ed;
    --iv: #faf9f5;
    --nk: #141413;
    --ds: #30302e;
    --tc: #c96442;
    --og: #5e5d59;
    --sg: #87867f;
    --bc: #f0eee6;
    --bw: #e8e6dc;
    --ws: #b0aea5;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--pg);
    color: var(--nk);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  }

  body {
    display: grid;
    place-items: center;
  }

  .card {
    position: relative;
    width: 1080px;
    height: 1440px;
    overflow: hidden;
    background: var(--iv);
    box-shadow: 0px 0px 0px 1px rgba(0,0,0,0.08);
  }

  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.72;
    pointer-events: none;
    background:
      radial-gradient(circle at 18% 14%, var(--bc) 0 1px, transparent 1px 9px),
      linear-gradient(90deg, transparent 0 23px, var(--bc) 23px 24px, transparent 24px 48px);
  }

  .cover {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-rows: 176px 1fr 172px;
    padding: 78px 82px 64px;
  }

  .topline,
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--og);
    font-size: 18px;
    letter-spacing: 0;
  }

  .kicker {
    color: var(--tc);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .folio {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 56px;
    font-weight: 500;
    color: var(--nk);
    letter-spacing: 0;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr;
    align-content: start;
    gap: 34px;
  }

  .title {
    margin: 0;
    max-width: 900px;
    font-family: Georgia, "Times New Roman", "Songti SC", serif;
    font-size: 72px;
    line-height: 1.05;
    font-weight: 500;
    letter-spacing: 0;
  }

  .subtitle {
    max-width: 820px;
    margin: 0;
    color: var(--og);
    font-size: 29px;
    line-height: 1.52;
    letter-spacing: 0;
  }

  .rule {
    width: 228px;
    height: 18px;
  }

  .content-grid {
    display: grid;
    grid-template-columns: 1.02fr 0.78fr;
    gap: 36px;
    align-items: start;
  }

  .points {
    display: grid;
    gap: 18px;
  }

  .point {
    padding: 22px 24px;
    background: var(--pg);
    border: 1px solid var(--bw);
    box-shadow: 0px 0px 0px 1px rgba(0,0,0,0.04);
  }

  .point b {
    display: block;
    margin-bottom: 7px;
    color: var(--nk);
    font-size: 24px;
    line-height: 1.32;
    font-weight: 500;
    letter-spacing: 0;
  }

  .point span {
    display: block;
    color: var(--og);
    font-size: 22px;
    line-height: 1.52;
    letter-spacing: 0;
  }

  .aside {
    min-height: 530px;
    padding: 30px 28px;
    color: var(--iv);
    background: var(--ds);
    border: 1px solid var(--ds);
    box-shadow: 0px 0px 0px 1px rgba(0,0,0,0.08);
  }

  .aside .label {
    margin-bottom: 20px;
    color: var(--ws);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .aside .big {
    margin: 0 0 22px;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 72px;
    line-height: 0.95;
    font-weight: 500;
    color: var(--iv);
  }

  .aside p {
    margin: 0;
    color: var(--ws);
    font-size: 22px;
    line-height: 1.56;
  }

  .diagram {
    width: 100%;
    height: 260px;
    margin-top: 34px;
  }

  .quote {
    position: relative;
    margin-top: 12px;
    padding: 28px 30px 30px;
    border-left: 4px solid var(--tc);
    background: var(--pg);
    color: var(--nk);
    font-family: Georgia, "Times New Roman", "Songti SC", serif;
    font-size: 32px;
    line-height: 1.42;
    font-weight: 500;
  }

  .quote svg {
    position: absolute;
    left: 12px;
    top: -16px;
    z-index: 0;
  }

  .quote span {
    position: relative;
    z-index: 1;
  }

  .footer {
    align-items: end;
    border-top: 1px solid var(--bw);
    padding-top: 22px;
  }

  .footer strong {
    display: block;
    color: var(--nk);
    font-size: 19px;
    font-weight: 500;
  }

  .footer span {
    color: var(--sg);
    font-size: 17px;
  }

  .save {
    position: fixed;
    right: 16px;
    bottom: 16px;
    border: 1px solid var(--bw);
    background: var(--iv);
    color: var(--nk);
    padding: 10px 12px;
    font: 500 13px/1 -apple-system, system-ui, sans-serif;
  }

  .shot .save {
    display: none;
  }

  @media print {
    .save { display: none; }
  }
</style>
</head>

      <div class="content-grid">
        <section class="points" id="points"></section>
        <aside class="aside">
          <div class="label" id="asideLabel"></div>
          <p class="big" id="asideBig"></p>
          <p id="asideText"></p>
          <svg class="diagram" id="diagram" viewBox="0 0 320 260" aria-hidden="true"></svg>
        </aside>
      </div>

      <blockquote class="quote">
        <svg width="100" height="86" viewBox="0 0 100 86" aria-hidden="true">
          <text x="0" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="94" fill="#c96442" opacity="0.08">“</text>

        <span id="quote"></span>
      </blockquote>
    </main>

    <footer class="footer">
      <div>
        <strong id="footerTitle"></strong>
        <span id="footerNote"></span>
      </div>
      <div id="footerMeta"></div>

  </section>
</article>

function getCardIndex() {
  const params = new URLSearchParams(window.location.search);
  const n = Number(params.get("card") || "1");
  return Math.max(0, Math.min(cards.length - 1, Math.floor(n) - 1));
}

function pointHTML(points) {
  return points.map(([head, body]) => `
    <div class="point">
      <b>${head}</b>
      <span>${body}</span>
    </div>
  `).join("");
}

  return diagrams[kind] || diagrams.tree;
}

function render() {
  const card = cards[getCardIndex()];
  document.getElementById("kicker").textContent = card.kicker;
  document.getElementById("series").textContent = card.series;
  document.getElementById("folio").textContent = String(getCardIndex() + 1).padStart(2, "0");
  document.getElementById("title").textContent = card.title;
  document.getElementById("subtitle").textContent = card.subtitle;
  document.getElementById("points").innerHTML = pointHTML(card.points);
  document.getElementById("asideLabel").textContent = card.asideLabel;
  document.getElementById("asideBig").textContent = card.asideBig;
  document.getElementById("asideText").textContent = card.asideText;
  document.getElementById("diagram").innerHTML = diagramSVG(card.diagram);
  document.getElementById("quote").textContent = card.quote;
  document.getElementById("footerTitle").textContent = card.footerTitle;
  document.getElementById("footerNote").textContent = card.footerNote;
  document.getElementById("footerMeta").textContent = card.footerMeta;
}

render();
</script>
